name: Bug report
description: Something in the skill or a command is wrong, misleading, or broken.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. For a factual error in a reference file, use **Content correction** instead.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - A command (/sysdesign:...)
        - The skill router (SKILL.md)
        - A reference file
        - Plugin install / manifests
        - Other
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: File or command
      placeholder: "commands/compare.md  or  references/data-storage.md"
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you asked, what the plugin did, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/sysdesign:explain ...`
        2. ...
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "0.2.0 (see .claude-plugin/plugin.json)"
