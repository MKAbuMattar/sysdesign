<g transform="translate(150,160)">
<line x1="0" y1="0" x2="0" y2="-70" stroke="#5B8DEF" stroke-width="4" stroke-linecap="round"/>
<line x1="0" y1="0" x2="-61" y2="35" stroke="#3BB89A" stroke-width="4" stroke-linecap="round"/>
<line x1="0" y1="0" x2="61" y2="35" stroke="#E0A458" stroke-width="4" stroke-linecap="round"/>
<line x1="0" y1="-70" x2="-61" y2="35" stroke="#8A94A6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
<line x1="-61" y1="35" x2="61" y2="35" stroke="#8A94A6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
