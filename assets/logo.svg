<text x="378" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="60" font-weight="400" fill="#5B8DEF">design</text>
<text x="272" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#8A94A6" letter-spacing="3">SYSTEM DESIGN FOR AGENTS</text>
